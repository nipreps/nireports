# Set update schedule for GitHub Actions

version: 2
updates:

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      # Check for updates to GitHub Actions every week
      interval: "weekly"
    groups:
      actions-infrastructure:
        patterns:
          - "actions/*"
    cooldown:
      default-days: 14
  - package-ecosystem: uv
    directory: "/"
    labels: ["dependencies"]
    schedule:
      interval: monthly
    groups:
      python:
        patterns:
          - "*"
    cooldown:
      default-days: 14
